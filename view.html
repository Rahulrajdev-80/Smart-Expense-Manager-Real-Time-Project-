<h2>Expenses</h2>

<table border="1">
<tr>
    <th>Name</th>
    <th>Amount</th>
    <th>Category</th>
    <th>Description</th>
    <th>Date</th>
</tr>

{% for d in data %}
<tr>
    <td>{{d[0]}}</td>
    <td>{{d[1]}}</td>
    <td>{{d[2]}}</td>
    <td>{{d[3]}}</td>
    <td>{{d[4]}}</td>
</tr>
{% endfor %}

</table>
